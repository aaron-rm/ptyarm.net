<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARM - Crear cuenta</title>
    <link rel="icon" href="LOGO.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style-login.css">

</head>

<body>

    <header class="header">
        <div class="logo">
            <img src="LOGO.png" alt="Logo ARM" class="logo-image">
        </div>
        <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="login.html">Iniciar sesión</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="login-card">
            <p class="tagline">Únete a ARM</p>
            <h1 class="title">Crear cuenta</h1>
            <div class="divider"></div>

            <form action="#" method="post" id="form-registro">
                <div class="form-group">
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre completo" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Celular</label>
                    <div class="phone-input-wrapper">
                        <span class="phone-prefix">+507</span>
                        <input type="tel" id="phone" name="phone" placeholder="6000-0000"
                            maxlength="8" inputmode="numeric" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="whatsapp_contact">
                        ¿Te gustaría que te contactemos por WhatsApp?
                    </label>
                </div>

                <button type="submit" class="btn-login">Crear cuenta</button>
            </form>

            <p class="form-footer">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
        </div>
    </main>

    <footer class="footer">
        
    </footer>
    <script>
        document.getElementById('phone').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 8);
        });
    </script>
    <script type="module">
        import { registrar } from './js/auth.js';
        import { redirigirSiHaySesion } from './js/nav.js';

        // Si ya hay sesión activa, no mostrar el formulario de registro
        redirigirSiHaySesion('index.html');

        document.getElementById('form-registro').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phoneDigits = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const whatsapp = document.querySelector('[name="whatsapp_contact"]').checked;

            if (phoneDigits.length !== 8) {
                alert('El celular debe tener exactamente 8 dígitos.');
                return;
            }

            const phone = phoneDigits;
            registrar(email, password, name, phone, whatsapp);
        });
    </script>
</body>

</html>
