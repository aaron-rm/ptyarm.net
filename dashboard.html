<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARM - Mi cuenta</title>
    <link rel="icon" href="LOGO.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="header">
        <div class="logo">
            <img src="LOGO.png" alt="Logo ARM" class="logo-image">
        </div>
        <nav class="nav-links">
            <a href="index.html">Inicio</a>
            <a href="#" id="logout-link">Cerrar sesión</a>
        </nav>
    </header>

    <main class="main-content">
        <p class="tagline">Tu cuenta</p>
        <h1 class="title" id="saludo">Cargando...</h1>
        <div class="divider"></div>
        <p class="description">Esta es una página protegida: solo se ve si hay sesión activa.</p>
    </main>

    <footer class="footer">

    </footer>

    <script type="module">
        import { logout } from './js/auth.js';
        import { requerirSesion } from './js/nav.js';

        // Si no hay sesión, esto redirige automáticamente a login.html
        const session = await requerirSesion('login.html');

        if (session) {
            document.getElementById('saludo').textContent =
                'Hola, ' + session.user.email;
        }

        document.getElementById('logout-link').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });
    </script>
</body>

</html>
