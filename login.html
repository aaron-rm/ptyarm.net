<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARM - Iniciar sesión</title>
    <link rel="icon" href="LOGO.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style-login.css">
</head>

<body>

    <header class="header">
        <div class="logo">
            <img src="LOGO.png" alt="Logo ARM" class="logo-image">
        </div>
        <nav class="nav-links">
            <a href="index.html">Inicio</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="login-card">
            <p class="tagline">Bienvenido de nuevo</p>
            <h1 class="title">Iniciar sesión</h1>
            <div class="divider"></div>

            <form action="#" method="post" id="form-login">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        Recordarme
                    </label>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <p class="form-footer">¿No tienes cuenta? <a href="register.html">Crea una aquí</a></p>
        </div>
    </main>

    <footer class="footer">
        
    </footer>

    <script type="module" src="js/conexion.js"></script>
    <script type="module">
        import { login } from './js/auth.js';

        // Manejar el inicio de sesión
        document.getElementById('form-login').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        login(email, password);
        });
    </script>
</body>

</html>
